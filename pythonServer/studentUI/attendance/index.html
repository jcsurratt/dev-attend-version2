<!doctype html>
<script src="/static/live.js"></script>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Attendance Sheet</title>
    <link rel="stylesheet" href="/static/style.css?v=attendance-na-all-students-20260418" />
  </head>
  <body>
    <header>
      <a href="/"
        ><img id="logo" src="/static/logo.webp" alt="NRCC Logo"
      /></a>
      <div class="navbar-time" id="current-time"></div>
      <div class="header-text">
        <h1>Attendance System</h1>
        <nav id="main-nav">
          <div class="nav-links" id="nav-links"></div>
          <div class="nav-auth" id="nav-auth"></div>
        </nav>
        <script src="/static/navbar.js"></script>
      </div>
    </header>

    <div>
      <label>Class:</label>
      <input
        type="text"
        id="classSearchInput"
        placeholder="Search Classes"
        onkeyup="searchClasses()"
      />
      <select id="classSelect"></select>
      <div
        id="classSearchResults"
        class="class-search-results"
        aria-live="polite"
      ></div>
    </div>

    <div class="attendance-export-row">
      <button id="exportAttendanceButton" type="button" disabled>
        Export Attendance CSV
      </button>
      <span id="exportAttendanceHint">Choose a class code to enable export.</span>
    </div>

    <div>
      <input
        type="text"
        id="searchInput"
        placeholder="Search Students"
        onkeyup="searchStudents()"
      />
    </div>

    <div class="manual-student-row">
      <span class="manual-student-label">Manually add a student to the roster:</span>
      <input
        type="text"
        id="newStudentFirstName"
        placeholder="First Name"
      />
      <input
        type="text"
        id="newStudentLastName"
        placeholder="Last Name"
      />
      <button onclick="addStudent()">Add Student</button>
    </div>

    <div id="students"></div>

    <br />
    <a href="/camera"><button>Go to Camera</button></a>
    <a href="/"><button>Go Home</button></a>

    <script src="/static/attendance/app.js?v=attendance-label-colons-20260418"></script>
  </body>
</html>
