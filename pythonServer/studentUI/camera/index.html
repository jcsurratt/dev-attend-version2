<!doctype html>
<script src="/static/live.js"></script>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Camera - Attendance</title>
    <link rel="stylesheet" href="/static/style.css?v=header-overlap-fix-2-20260428" />
  </head>
  <body>
    <header>
      <a href="/"
        ><img id="logo" src="/static/logo.webp" alt="NRCC Logo"
      /></a>
      <div class="header-text">
        <h1>Attendance System</h1>
        <div class="navbar-time" id="current-time"></div>
        <nav id="main-nav">
          <div class="nav-links" id="nav-links"></div>
          <div class="nav-auth" id="nav-auth"></div>
        </nav>
        <script src="/static/navbar.js"></script>
      </div>
    </header>
    <div id="camera-screen">
      <!-- CAMERA SCREEN -->
      <h1 id="camera-header"></h1>
      <h2>Look at the camera.</h2>
      <div id="camera-class-picker">
        <label for="cameraClassSelect">Select a Class:</label>
        <select id="cameraClassSelect"></select>
      </div>

      <!-- Local camera feed with overlay canvas -->
      <div id="camera-container">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <canvas id="overlayCanvas" width="400" height="300"></canvas>
        <div id="faceIdWrap">
          <canvas id="faceIdCircle" width="180" height="180"></canvas>
        </div>
      </div>

      <!-- Face ID circle (visible during registration) -->

      <p id="scanningInstruction" hidden>
        The site is scanning your face. Turn your head in a circular motion for the camera.
      </p>
      <h3 id="recognitionHeader"></h3>
    </div>

    <br /><br />
    <div class="page-actions">
      <button type="button" class="camera-nav-exit" data-href="/">Go Home</button>
    </div>

    <script src="/static/camera/app.js?v=camera-button-onclick-20260428"></script>
  </body>
</html>
