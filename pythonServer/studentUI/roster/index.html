<!doctype html>
<script src="/static/live.js"></script>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Roster</title>
    <link rel="stylesheet" href="/static/style.css?v=roster-class-filter-ui-20260418" />
  </head>
  <body>
    <header>
      <a href="/"><img id="logo" src="/static/logo.webp" alt="NRCC Logo" /></a>
      <div class="navbar-time" id="current-time"></div>
      <div class="header-text">
        <h1>Attendance System</h1>
        <nav id="main-nav">
          <div class="nav-links" id="nav-links"></div>
          <div class="nav-auth" id="nav-auth"></div>
        </nav>
        <script src="/static/navbar.js"></script>
      </div>
    </header>
    <section class="roster-panel" aria-labelledby="classes-heading">
      <h2 id="classes-heading">Class Roster</h2>
      <div class="form-row">
        <input
          type="text"
          name="new_class_name"
          id="newClassName"
          placeholder="Class Name"
        />
        <button id="addNewClass" type="button">Add New Class</button>
      </div>
      <div id="classList" class="list-panel"></div>
    </section>

    <section class="roster-panel" aria-labelledby="students-heading">
      <h2 id="students-heading">Student Roster</h2>
      <p class="section-helper-label">Add a student:</p>
      <div id="col">
        <input
          type="text"
          name="fname"
          id="fname"
          placeholder="Student First Name"
        />
        <input
          type="text"
          name="lname"
          id="lname"
          placeholder="Student Last Name"
        />
        <select
          name="class_name"
          id="class_name"
        ></select>
        <div class="add-student-action">
          <button id="addNewStudent" type="button">Add New Student</button>
          <span id="addStudentStatus" aria-live="polite"></span>
        </div>
      </div>
      <div class="manual-student-row">
        <span class="manual-student-label">Import a CSV into one class:</span>
        <input type="file" id="rosterCsvFile" accept=".csv,text/csv" />
        <button id="uploadRosterCsv" type="button" disabled>Upload CSV</button>
        <span id="rosterCsvHint">Choose a class code before uploading.</span>
        <span id="rosterCsvStatus" aria-live="polite"></span>
      </div>
      <div id="row">
        <input type="checkbox" id="toggleShowDisabled" />
        <label for="toggleShowDisabled"
          >Show students unregistered to a class only.</label
        >
      </div>
      <div class="form-row">
        <label for="rosterClassFilter">Filter students by class:</label>
        <select id="rosterClassFilter"></select>
      </div>
      <div id="main"></div>
    </section>
    <br />
    <a href="/"><button>Go Home</button></a>
    <script src="/jsGlobals/libloader.js"></script>
    <script src="/jsGlobals/allfuncs.js"></script>
    <script src="/static/roster/app.js?v=roster-action-button-20260430c"></script>
  </body>
</html>
